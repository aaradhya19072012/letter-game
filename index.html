<!DOCTYPE html>
<html>
<head>
  <title>Funny Letter AI 😂✉️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
    }

    .box {
      background: white;
      color: black;
      min-height: 100vh;
      max-width: 520px;
      margin: auto;
      padding: 15px;
      box-sizing: border-box;
    }

    h2 { text-align: center; }

    button {
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: none;
      background: #ff6b6b;
      color: white;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active { transform: scale(0.97); }

    input, textarea {
      padding: 12px;
      margin: 6px 0;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    #letter {
      margin-top: 15px;
      white-space: pre-line;
      background: #f4f4f4;
      padding: 12px;
      border-radius: 12px;
      min-height: 120px;
    }

    .section { margin-top: 10px; }
  </style>
</head>

<body>

<div class="box">

  <h2>😂 Funny Letter AI ✉️</h2>

  <!-- STEP 1 -->
  <div id="step1">
    <p>Choose Person:</p>

    <button onclick="setLetter('Mother')">👩 Mother</button>
    <button onclick="setLetter('Father')">👨 Father</button>
    <button onclick="setLetter('Teacher')">📚 Teacher</button>
    <button onclick="setLetter('Principal')">🏫 Principal</button>
    <button onclick="setLetter('Friend')">😂 Friend</button>
    <button onclick="setLetter('Shopkeeper')">🛒 Shopkeeper</button>
    <button onclick="setLetter('Police')">🚓 Police</button>
    <button onclick="setLetter('Neighbor')">🏠 Neighbor</button>
    <button onclick="setLetter('Grandma')">👵 Grandma</button>
    <button onclick="setLetter('Doctor')">🧑‍⚕️ Doctor</button>
    <button onclick="setLetter('Chef')">👨‍🍳 Chef</button>
    <button onclick="setLetter('Hacker')">🧑‍💻 Hacker</button>
    <button onclick="setLetter('Alien')">👽 Alien</button>
    <button onclick="setLetter('Robot')">🤖 Robot</button>
    <button onclick="setLetter('Wizard')">🧙 Wizard</button>
    <button onclick="setLetter('Scientist')">🧪 Scientist</button>
    <button onclick="setLetter('Student')">🎓 Student</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <p>Choose Topic:</p>
    <div id="topics"></div>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">

    <input id="name" placeholder="Your Name">
    <input id="noun" placeholder="Noun">
    <input id="plural" placeholder="Plural">
    <input id="adj" placeholder="Adjective">
    <input id="noun2" placeholder="Another noun">

    <button onclick="generate()">Generate 😂</button>
  </div>

  <div id="letter"></div>
  <div id="rating"></div>

  <!-- ACTIONS -->
  <div id="actions" style="display:none;">

    <button onclick="plotTwist()">😈 Plot Twist</button>
    <button onclick="aiRate()">🤖 AI Rating</button>
    <button onclick="playAgain()">🔁 Play Again</button>
    <button onclick="endGame()">🛑 End Game</button>

  </div>

  <!-- FEEDBACK -->
  <div id="feedbackBox" style="display:none;">
    <textarea id="feedback" placeholder="Write feedback..."></textarea>
    <button onclick="submitFeedback()">Submit Feedback</button>
  </div>

</div>

<script>

let letterType = "";
let topic = "";
let currentLetter = "";

/* 17 PEOPLE */
let topicList = {
  Mother:["burned kitchen","lost recipe","midnight chaos"],
  Father:["wallet missing","TV remote war","car keys lost"],
  Teacher:["homework chaos","exam disaster","silent class"],
  Principal:["assembly chaos","rule change","student rebellion"],
  Friend:["prank disaster","funny moment","embarrassing chaos"],
  Shopkeeper:["wrong change","snack theft","shop chaos"],
  Police:["traffic chase","missing evidence","wrong arrest"],
  Neighbor:["loud music","parking fight","garden chaos"],
  Grandma:["burnt food","mystery recipe","magic cooking"],
  Doctor:["hospital chaos","patient mix-up","medicine mystery"],
  Chef:["kitchen explosion","recipe failure","food chaos"],
  Hacker:["system hack","virus attack","password chaos"],
  Alien:["earth landing","space crash","galaxy chaos"],
  Robot:["AI glitch","robot cooking","machine failure"],
  Wizard:["magic spell","potion explosion","portal chaos"],
  Scientist:["lab explosion","time machine","experiment chaos"],
  Student:["exam cheating","homework missing","class prank"]
};

function setLetter(type){
  letterType = type;

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";

  let list = topicList[type];

  let html = "";
  list.forEach(t=>{
    html += `<button onclick="setTopic('${t}')">${t}</button>`;
  });

  document.getElementById("topics").innerHTML = html;
}

function setTopic(t){
  topic = t;

  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function generate(){

  let name = document.getElementById("name").value || "Me";
  let noun = document.getElementById("noun").value || "banana";
  let plural = document.getElementById("plural").value || "cats";
  let adj = document.getElementById("adj").value || "crazy";
  let noun2 = document.getElementById("noun2").value || "robot";

  currentLetter =
`Dear ${letterType},

Topic: ${topic}

A ${noun} appeared suddenly.

${plural} became very ${adj}.

A ${noun2} made everything worse.

Now everything is chaos.

- ${name} 😂`;

  document.getElementById("letter").innerText = currentLetter;
  document.getElementById("actions").style.display = "block";
}

/* PLOT TWIST */
function plotTwist(){
  let twists = [
    "P.S. This was all a dream 😴",
    "P.S. You are inside the story 👀",
    "P.S. The letter is alive 😱",
    "P.S. It will continue again..."
  ];

  currentLetter += "\n\n" + twists[Math.floor(Math.random()*twists.length)];
  document.getElementById("letter").innerText = currentLetter;
}

/* AI RATING */
function aiRate(){
  let score = Math.floor(Math.random()*5)+6;
  document.getElementById("rating").innerText =
    "🤖 AI Rating: " + score + "/10 😂";
}

/* PLAY AGAIN */
function playAgain(){
  location.reload();
}

/* END GAME */
function endGame(){
  document.getElementById("feedbackBox").style.display = "block";
}

/* FEEDBACK */
function submitFeedback(){
  alert("Thanks for your feedback 😄");
}

</script>

</body>
</html>
