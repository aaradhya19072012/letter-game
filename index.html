<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funny Letter AI 😂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#667eea,#764ba2);
}

.box{
  background:white;
  max-width:520px;
  margin:auto;
  min-height:100vh;
  padding:15px;
  box-sizing:border-box;
}

h2{text-align:center;}

button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:#ff6b6b;
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

button:active{transform:scale(0.97);}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

#letter{
  white-space:pre-line;
  background:#f4f4f4;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  min-height:120px;
}

.section{margin-top:10px;}

</style>
</head>

<body>

<div class="box">

<h2>😂 Funny Letter AI</h2>

<!-- STEP 1 -->
<div id="step1">
<p>Choose Person:</p>

<button onclick="setLetter('Mother')">👩 Mother</button>
<button onclick="setLetter('Father')">👨 Father</button>
<button onclick="setLetter('Teacher')">📚 Teacher</button>
<button onclick="setLetter('Principal')">🏫 Principal</button>
<button onclick="setLetter('Friend')">😂 Friend</button>
<button onclick="setLetter('Shopkeeper')">🛒 Shopkeeper</button>
<button onclick="setLetter('Police')">🚓 Police</button>
<button onclick="setLetter('Neighbor')">🏠 Neighbor</button>
<button onclick="setLetter('Grandma')">👵 Grandma</button>
<button onclick="setLetter('Doctor')">🧑‍⚕️ Doctor</button>
<button onclick="setLetter('Chef')">👨‍🍳 Chef</button>
<button onclick="setLetter('Hacker')">🧑‍💻 Hacker</button>
<button onclick="setLetter('Alien')">👽 Alien</button>
<button onclick="setLetter('Robot')">🤖 Robot</button>
<button onclick="setLetter('Wizard')">🧙 Wizard</button>
<button onclick="setLetter('Scientist')">🧪 Scientist</button>
<button onclick="setLetter('Student')">🎓 Student</button>

</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
<p>Choose Topic:</p>
<div id="topics"></div>
</div>

<!-- STEP 3 -->
<div id="step3" style="display:none;">

<input id="name" placeholder="Your Name">
<input id="noun" placeholder="Noun">
<input id="plural" placeholder="Plural">
<input id="adj" placeholder="Adjective">
<input id="noun2" placeholder="Another noun">

<button onclick="generate()">Generate 😂</button>
</div>

<div id="letter"></div>
<div id="rating"></div>

<div id="actions" style="display:none;" class="section">
<button onclick="plotTwist()">😈 Plot Twist</button>
<button onclick="aiRate()">🤖 AI Rating</button>
<button onclick="restart()">🔁 Play Again</button>
<button onclick="endGame()">🛑 End Game</button>
</div>

<div id="feedbackBox" style="display:none;" class="section">
<textarea id="feedback" placeholder="Write feedback..."></textarea>
<button onclick="submitFeedback()">Submit Feedback</button>
</div>

</div>

<script>

let letterType="";
let topic="";
let currentLetter="";

/* 17 PEOPLE SAFE MAP */
let topicList={
Mother:["burned kitchen","lost recipe"],
Father:["wallet missing","TV remote war"],
Teacher:["homework chaos","exam disaster"],
Principal:["assembly chaos","rule change"],
Friend:["prank disaster","fun chaos"],
Shopkeeper:["wrong change","snack theft"],
Police:["traffic chase","missing case"],
Neighbor:["loud music","parking fight"],
Grandma:["burnt food","magic cooking"],
Doctor:["hospital chaos","patient mix-up"],
Chef:["kitchen explosion","recipe failure"],
Hacker:["system hack","virus attack"],
Alien:["earth landing","space crash"],
Robot:["AI glitch","machine failure"],
Wizard:["magic spell","potion explosion"],
Scientist:["lab explosion","time machine"],
Student:["exam cheating","homework missing"]
};

function setLetter(type){
  letterType=type;

  document.getElementById("step1").style.display="none";
  document.getElementById("step2").style.display="block";

  let list=topicList[type]||["random chaos"];

  let html="";
  list.forEach(t=>{
    html+=`<button onclick="setTopic('${t}')">${t}</button>`;
  });

  document.getElementById("topics").innerHTML=html;
}

function setTopic(t){
  topic=t;

  document.getElementById("step2").style.display="none";
  document.getElementById("step3").style.display="block";
}

function generate(){

let name=document.getElementById("name").value||"Me";
let noun=document.getElementById("noun").value||"banana";
let plural=document.getElementById("plural").value||"cats";
let adj=document.getElementById("adj").value||"crazy";
let noun2=document.getElementById("noun2").value||"robot";

currentLetter=
`Dear ${letterType},

Topic: ${topic}

A ${noun} caused chaos.

${plural} became ${adj}.

A ${noun2} made things worse.

- ${name} 😂`;

document.getElementById("letter").innerText=currentLetter;
document.getElementById("actions").style.display="block";
}

function plotTwist(){
let t=[
"P.S. It was all a dream 😴",
"P.S. You are inside story 👀",
"P.S. This continues forever...",
"P.S. The letter is alive 😱"
];

currentLetter+="\n\n"+t[Math.floor(Math.random()*t.length)];
document.getElementById("letter").innerText=currentLetter;
}

function aiRate(){
let score=Math.floor(Math.random()*5)+6;
document.getElementById("rating").innerText="🤖 AI Rating: "+score+"/10";
}

function restart(){
location.reload();
}

function endGame(){
document.getElementById("feedbackBox").style.display="block";
}

function submitFeedback(){
alert("Thanks for feedback 😄");
}

</script>

</body>
</html>
